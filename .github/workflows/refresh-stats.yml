name: Refresh stats card

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:           # allow manual run

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch pixel-profile stats card
        run: |
          mkdir -p assets
          # cache-bust param forces a fresh render (picks up avatar/stat changes)
          curl -fsSL --retry 6 --retry-delay 10 --retry-all-errors \
            "https://1-beryl-ten.vercel.app/api/github-stats?username=houj716-cloud&theme=crt&cb=$(date +%s)" \
            -o assets/stats.png
          # sanity check: must be a non-trivial PNG
          test "$(stat -c%s assets/stats.png)" -gt 1000

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain assets/stats.png)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/stats.png
            git commit -m "chore: refresh stats card"
            git push
          else
            echo "No changes in stats card."
          fi
